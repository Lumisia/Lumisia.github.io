name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  schedule:
    # Daily at 03:17 KST. Avoid top-of-hour GitHub Actions congestion.
    - cron: '17 18 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.148.0
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Generate GitHub metrics
        if: ${{ env.METRICS_TOKEN != '' }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ env.METRICS_TOKEN }}
          user: Lumisia
          filename: github-metrics.svg
          output_action: none
          template: classic
          config_timezone: Asia/Seoul
          config_display: regular
          config_output: svg
          base: header, activity, repositories
      - name: Install generated GitHub metrics
        if: ${{ env.METRICS_TOKEN != '' }}
        run: |
          mkdir -p assets/images/github
          cp /metrics_renders/github-metrics.svg assets/images/github/github-metrics.svg
      - name: Use bundled GitHub metrics placeholder
        if: ${{ env.METRICS_TOKEN == '' }}
        run: echo "::warning::METRICS_TOKEN is not set; using bundled placeholder metrics SVG."
      - name: Fetch Tistory blog posts
        run: |
          python3 << 'EOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          import json
          import os
          from email.utils import parsedate_to_datetime

          try:
              url = "https://lumisia.tistory.com/rss"
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=15) as resp:
                  content = resp.read()

              tree = ET.fromstring(content)
              channel = tree.find("channel")
              items = []
              for item in channel.findall("item")[:5]:
                  pub_date = item.findtext("pubDate", "")
                  try:
                      dt = parsedate_to_datetime(pub_date)
                      formatted = dt.strftime("%Y.%m.%d")
                  except Exception:
                      formatted = pub_date[:10]
                  items.append({
                      "title": item.findtext("title", ""),
                      "link":  item.findtext("link", ""),
                      "date":  formatted,
                  })

              os.makedirs("data", exist_ok=True)
              with open("data/posts.json", "w", encoding="utf-8") as f:
                  json.dump(items, f, ensure_ascii=False, indent=2)
              print(f"Fetched {len(items)} posts")
          except Exception as e:
              print(f"RSS fetch failed: {e}")
          EOF
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
